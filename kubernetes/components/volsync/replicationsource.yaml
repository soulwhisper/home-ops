---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${APP}"
spec:
  sourcePVC: "${VOLSYNC_CLAIM:-${APP}}"
  trigger:
    schedule: "${VOLSYNC_SCHEDULE:-0 */6 * * *}"
  kopia:
    accessModes:
      - "${VOLSYNC_SNAP_ACCESSMODES:-ReadWriteOnce}"
    cacheAccessModes:
      - "${VOLSYNC_CACHE_ACCESSMODES:-ReadWriteOnce}"
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:-5Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_SNAPSHOTCLASS:-ceph-block}" # openebs-hostpath disabled until system on pcie3x2
    compression: zstd-fastest
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: "${APP_UID:-2000}"
      runAsGroup: "${APP_GID:-2000}"
      fsGroup: "${APP_GID:-2000}"
    parallelism: 4
    repository: "${APP}-volsync"
    retain:
      hourly: 0
      daily: 14
    storageClassName: "${VOLSYNC_STORAGECLASS:-ceph-block}"
    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:-ceph-block-snapshot}"
