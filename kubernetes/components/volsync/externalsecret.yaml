---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        KOPIA_REPOSITORY: "s3://volsync/${APP}"
        KOPIA_PASSWORD: "{{ .volsync }}"
        AWS_S3_ENDPOINT: "http://nas.homelab.internal:9000"
        AWS_S3_DISABLE_TLS: "true"
        # versitygw
        AWS_ACCESS_KEY_ID: "{{ .admin_user }}"
        AWS_SECRET_ACCESS_KEY: "{{ .admin_pass }}"
  dataFrom:
    - extract:
        key: encryption_cipher
    - extract:
        key: app_user
