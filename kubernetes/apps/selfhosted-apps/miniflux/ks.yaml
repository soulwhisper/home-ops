---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name miniflux
  annotations:
    config.home-ops.io/managed: "true"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: selfhosted-apps
  path: "./kubernetes/apps/selfhosted-apps/miniflux/app"
  dependsOn:
    - name: cnpg-cluster
      namespace: database-system
    - name: onepassword-connect
      namespace: security-system
  components:
    - ../../../../components/cnpg
  postBuild:
    substitute:
      APP: *name
