---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: honcho
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        # Deriver
        DERIVER_MODEL_CONFIG__MODEL: &model "fast"
        DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: &base_url "http://agentgateway-proxy.networking-system.svc.cluster.local:80/chat"
        DERIVER_MODEL_CONFIG__OVERRIDES__API_KEY_ENV: &api_key_env "{{ .agentgateway_api_auth }}"
        # Dialectic
        DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: *model
        DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: *model
        DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: *model
        DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: *model
        DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: *model
        DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        # Summary
        SUMMARY_MODEL_CONFIG__MODEL: *model
        SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        SUMMARY_MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        # Dream
        DREAM_DEDUCTION_MODEL_CONFIG__MODEL: *model
        DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env
        DREAM_INDUCTION_MODEL_CONFIG__MODEL: *model
        DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: *base_url
        DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__API_KEY_ENV: *api_key_env

  dataFrom:
    - extract:
        key: llm-api
