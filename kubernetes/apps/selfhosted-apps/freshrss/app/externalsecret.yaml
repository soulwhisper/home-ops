---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        oidc_client_id: "{{ .freshrss_oidc_client_id }}"
        oidc_client_secret: "{{ .freshrss_oidc_client_secret }}"
  dataFrom:
    - extract:
        key: authentik
