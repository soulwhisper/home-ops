---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name freshrss
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: freshrss/freshrss
              tag: 1.28.1-alpine
            env:
              - name: CRON_MIN
                value: "*"
              - name: DOMAIN
                value: rss.noirprime.com
              - name: LISTEN
                value: &port 8080
              - name: FRESHRSS_INSTALL
                value: "--default-user admin"
              - name: OIDC_ENABLED
                value: "1"
              - name: OIDC_PROVIDER_METADATA_URL
                value: "https://auth.noirprime.com/application/o/freshrss/.well-known/openid-configuration"
              - name: OIDC_REMOTE_USER_CLAIM
                value: "email"
              - name: OIDC_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: *name
                    key: oidc_client_id
              - name: OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: *name
                    key: oidc_client_secret
              - name: OIDC_SCOPES
                value: "openid profile email"
              - name: OIDC_X_FORWARDED_HEADERS
                value: "X-Forwarded-Port X-Forwarded-Proto X-Forwarded-Host"
            resources:
              requests:
                cpu: 12m
              limits:
                memory: 512Mi

    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["rss.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: freshrss.svg
          gethomepage.dev/name: FreshRSS
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /var/www/FreshRSS/data
            subPath: data
          - path: /var/www/FreshRSS/extensions
            subPath: extensions
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/www/FreshRSS/data/cache
            subPath: cache
