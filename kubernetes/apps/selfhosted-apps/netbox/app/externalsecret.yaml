---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        username: "{{ .admin_user }}"
        password: "{{ .admin_pass }}"
        email: "{{ .admin_email }}"
        api_token: "{{ .netbox }}"
        oidc_client_id: "{{ .netbox_oidc_client_id }}"
        oidc_client_secret: "{{ .netbox_oidc_client_secret }}"
  dataFrom:
    - extract:
        key: app_user
    - extract:
        key: encryption_cipher
    - extract:
        key: authentik
