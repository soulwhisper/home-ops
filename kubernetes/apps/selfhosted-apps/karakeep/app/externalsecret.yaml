---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karakeep
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        NEXTAUTH_SECRET: "{{ .karakeep }}"
        MEILI_MASTER_KEY: "{{ .meilisearch }}"
        OAUTH_CLIENT_ID: "{{ .karakeep_oidc_client_id }}"
        OAUTH_CLIENT_SECRET: "{{ .karakeep_oidc_client_secret }}"
  dataFrom:
    - extract:
        key: encryption_cipher
    - extract:
        key: authentik
