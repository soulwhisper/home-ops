---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name karakeep
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        containers:
          app:
            image:
              repository: ghcr.io/karakeep-app/karakeep
              tag: 0.31.0
            env:
              BROWSER_WEB_URL: http://localhost:9222
              CRAWLER_DOWNLOAD_BANNER_IMAGE: true
              CRAWLER_ENABLE_ADBLOCKER: true
              CRAWLER_STORE_SCREENSHOT: true
              DATA_DIR: /data
              DISABLE_SIGNUPS: true
              MEILI_ADDR: http://localhost:7700
              NEXTAUTH_URL: https://bookmarks.noirprime.com
              DISABLE_NEW_RELEASE_CHECK: true
              COREPACK_INTEGRITY_KEYS: 0
              OPENAI_API_KEY: ollama
              OPENAI_BASE_URL: http://ollama.servitor-apps.svc.cluster.local:11434/v1
              INFERENCE_TEXT_MODEL: gemma4:26b
              INFERENCE_IMAGE_MODEL: gemma4:e4b
              OAUTH_PROVIDER_NAME: authentik
              OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: true
              OAUTH_WELLKNOWN_URL: https://auth.noirprime.com/application/o/karakeep/.well-known/openid-configuration
            envFrom:
              - secretRef:
                  name: *name
            ports:
              - name: http
                containerPort: &port 3000
            resources: &resources
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

          chrome:
            image:
              repository: gcr.io/zenika-hub/alpine-chrome
              tag: 124
            command:
              - chromium-browser
            args:
              - --headless
              - --no-sandbox
              - --disable-gpu
              - --disable-dev-shm-usage
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --hide-scrollbars
            ports:
              - name: http
                containerPort: 9222
            resources: *resources

          meilisearch:
            image:
              repository: getmeili/meilisearch
              tag: v1.42.1
            args:
              - /bin/meilisearch
              - --experimental-dumpless-upgrade
            env:
              MEILI_NO_ANALYTICS: true
            envFrom:
              - secretRef:
                  name: *name
            ports:
              - name: http
                containerPort: 7700
            resources: *resources

    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["bookmarks.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: karakeep.svg
          gethomepage.dev/name: Karakeep
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /data
            subPath: karakeep
          - path: /meili_data
            subPath: meilisearch
