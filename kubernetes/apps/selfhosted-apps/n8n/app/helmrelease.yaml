---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name n8n
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod: # this is a must for n8n
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: n8n-initdb
        containers:
          app:
            image:
              repository: ghcr.io/n8n-io/n8n
              tag: 2.15.0
            env:
              DB_TYPE: postgresdb
              DB_POSTGRESDB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: n8n-pguser
                    key: host
              DB_POSTGRESDB_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: n8n-pguser
                    key: db
              DB_POSTGRESDB_USER:
                valueFrom:
                  secretKeyRef:
                    name: n8n-pguser
                    key: username
              DB_POSTGRESDB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: n8n-pguser
                    key: password
              EXECUTIONS_DATA_PRUNE: true
              EXECUTIONS_DATA_MAX_AGE: 720
              EXECUTIONS_DATA_PRUNE_MAX_COUNT: 0
              GENERIC_TIMEZONE: "Asia/Shanghai"
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
              N8N_HOST: n8n.noirprime.com
              N8N_PROTOCOL: "https"
              N8N_PORT: &port 8080
              N8N_LOG_LEVEL: info
              N8N_LOG_OUTPUT: console
              N8N_PROXY_HOPS: 1
              N8N_DEFAULT_BINARY_DATA_MODE: filesystem
              WEBHOOK_URL: https://n8n.noirprime.com/
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["n8n.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: n8n.svg
          gethomepage.dev/name: N8N
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

      webhook:
        hostnames: ["n8n-webhook.noirprime.com"]
        parentRefs:
          - name: kgateway-external
            namespace: networking-system

        rules:
          - matches:
              - path:
                  value: /webhook
              - path:
                  value: /webhook-test
            backendRefs:
              - identifier: app
                port: http

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /home/node/.n8n
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /home/node/.cache
