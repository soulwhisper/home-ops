---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name open-notebook
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/lfnovo/open-notebook
              tag: 1.13.0
            env:
              SURREAL_URL: "ws://open-notebook-database.selfhosted-apps.svc.cluster.local:8000/rpc"
              SURREAL_USER: root
              SURREAL_PASSWORD: root
              SURREAL_NAMESPACE: open_notebook
              SURREAL_DATABASE: open_notebook
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            primary: true
            port: 8502
          rest:
            port: 5055

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /app/data
