---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name open-notebook-database
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            # hardcoded uid/gid
            # https://github.com/surrealdb/surrealdb/issues/2601
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              # upgrade until: https://github.com/lfnovo/open-notebook/issues/378
              repository: surrealdb/surrealdb
              tag: v2
            args: ["start"]
            env:
              SURREAL_PATH: "rocksdb:/data"
              SURREAL_USER: root
              SURREAL_PASS: root
              SURREAL_LOG: info
              SURREAL_EXPERIMENTAL_GRAPHQL: true
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8000

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /data
