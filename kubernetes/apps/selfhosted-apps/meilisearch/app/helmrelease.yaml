---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name meilisearch
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        containers:
          app:
            image:
              repository: getmeili/meilisearch
              tag: v1.43.0
            args:
              - --experimental-dumpless-upgrade
            env:
              MEILI_HOST: http://meilisearch:7700
              MEILI_NO_ANALYTICS: true
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

    service:
      app:
        ports:
          http:
            port: 7700

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /meili_data
