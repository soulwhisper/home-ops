---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hindsight
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        # LLM
        HINDSIGHT_API_LLM_PROVIDER: "openai"
        HINDSIGHT_API_LLM_BASE_URL: "http://agentgateway-proxy.networking-system.svc.cluster.local:80/v1"
        HINDSIGHT_API_LLM_MODEL: "fast"
        HINDSIGHT_API_LLM_API_KEY: "{{ .agentgateway_api_auth }}"
        HINDSIGHT_API_EMBEDDINGS_PROVIDER: "openai"
        HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: "BAAI/bge-m3"
        HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: "https://api.siliconflow.cn/v1"
        HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: "{{ .siliconflow }}"
        HINDSIGHT_API_EMBEDDINGS_OPENAI_BATCH_SIZE: "100"
        HINDSIGHT_API_RERANKER_PROVIDER: "siliconflow"
        HINDSIGHT_API_RERANKER_SILICONFLOW_MODEL: "BAAI/bge-reranker-v2-m3"
        HINDSIGHT_API_RERANKER_SILICONFLOW_API_KEY: "{{ .siliconflow }}"
  dataFrom:
    - extract:
        key: llm-api
