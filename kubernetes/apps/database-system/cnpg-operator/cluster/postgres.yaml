---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 3
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: barman-cloud
        serverName: postgres-v1 # changeme if restored
  storage:
    size: 50Gi
    storageClass: ceph-block
  superuserSecret:
    name: cloudnative-pg
  enableSuperuserAccess: true
  postgresql:
    shared_preload_libraries:
      - vchord
      - vchord_bm25
    parameters:
      effective_io_concurrency: "200"
      max_connections: "400"
      shared_buffers: "2GB"
  resources:
    requests:
      cpu: 500m
    limits:
      memory: 6Gi
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
  managed:
    roles:
      - name: immich
        ensure: present
        login: true
        superuser: false
      - name: hindsight
        ensure: present
        login: true
        superuser: false

---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: &name immich
spec:
  cluster:
    name: postgres
  name: *name
  owner: *name
  extensions:
    - name: vchord
      ensure: present
    - name: earthdistance
      ensure: present
---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: &name hindsight
spec:
  cluster:
    name: postgres
  name: *name
  owner: *name
  extensions:
    - name: vchord
      ensure: present
    - name: pgroonga
      ensure: present
