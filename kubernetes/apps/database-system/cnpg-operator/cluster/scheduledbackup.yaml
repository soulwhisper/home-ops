---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres
spec:
  schedule: "@daily"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: batch/v1
kind: CronJob
# Weekly backup verification — exits non-zero if WAL archive is broken.
# Surfaces as PrometheusRule via kube-state-metrics jobs metrics.
metadata:
  name: postgres-backup-verify
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: verify
              image: ghcr.io/cloudnative-pg/plugin-barman-cloud:v0.6.0
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      { name: cloudnative-pg, key: aws-access-key-id }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      { name: cloudnative-pg, key: aws-secret-access-key }
              command:
                - barman-cloud-check-wal-archive
                - --endpoint-url=http://nas.homelab.internal:9000
                - s3://postgres/
                - postgres-v1
