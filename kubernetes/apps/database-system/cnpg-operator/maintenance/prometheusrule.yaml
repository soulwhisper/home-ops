---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudnative-pg-maintenance-rules
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: dr-test.rules
      rules:
        - alert: PostgresBackupVerifyFailed
          expr: |
            kube_job_status_failed{namespace="database-system",job_name=~"postgres-backup-verify-.*"} > 0
          for: 15m
          labels: { severity: critical }
          annotations:
            summary: Postgres WAL archive verification job failed
            description: |
              The weekly barman-cloud-check-wal-archive job has reported
              a failure. The S3 backup chain may be broken — recent backups
              might not be restorable. Investigate before next backup window.
        - alert: PostgresBackupVerifyMissing
          expr: |
            (time() - max(kube_job_status_completion_time{namespace="database-system",job_name=~"postgres-backup-verify-.*"})) > 60 * 60 * 24 * 10
          for: 1h
          labels: { severity: warning }
          annotations:
            summary: Postgres backup verification has not run in 10 days
            description: |
              No successful run of postgres-backup-verify in the last 10 days
              (expected weekly). CronJob may be suspended or pod scheduling blocked.
