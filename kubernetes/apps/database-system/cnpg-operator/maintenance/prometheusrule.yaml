---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudnative-pg-maintenance-rules
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: dr-test.rules
      rules:
        - alert: PostgresBackupStale
          # No successful backup in last 36h (daily schedule + 12h grace)
          expr: |
            (time() - cnpg_collector_last_available_backup_timestamp{namespace="database-system",pod=~"postgres-.*"}) > 60 * 60 * 36
            or absent(cnpg_collector_last_available_backup_timestamp{namespace="database-system",pod=~"postgres-.*"})
          for: 30m
          labels: { severity: critical }
          annotations:
            summary: Postgres has no successful backup in last 36 hours
            description: |
              Last available backup timestamp is more than 36h old (or missing).
              ScheduledBackup may be failing, or the barman-cloud plugin cannot
              reach the S3 endpoint. Check `kubectl get backups -n database-system`
              and the CNPG operator logs.
        - alert: PostgresBackupFailing
          expr: |
            cnpg_collector_last_failed_backup_timestamp{namespace="database-system",pod=~"postgres-.*"}
              > cnpg_collector_last_available_backup_timestamp{namespace="database-system",pod=~"postgres-.*"}
          for: 1h
          labels: { severity: warning }
          annotations:
            summary: Postgres latest backup attempt failed
            description: |
              The most recent backup attempt failed (failed_ts > available_ts).
              Subsequent attempts may recover, but investigate to be sure.
        - alert: PostgresWALArchiveStale
          # WAL should be archived continuously; >1h gap with active DB suggests
          # archive_command is failing.
          expr: |
            (time() - cnpg_collector_first_recoverability_point{namespace="database-system",pod=~"postgres-.*"}) > 60 * 60 * 24 * 31
          for: 30m
          labels: { severity: warning }
          annotations:
            summary: Postgres recoverability window has exceeded 31 days
            description: |
              The earliest recoverable point is older than retention policy (30d).
              Either retention is not enforcing properly, or new WALs aren't archived.
        - alert: PostgresBackupVerifyFailed
          expr: |
            kube_job_status_failed{namespace="database-system",job_name=~"postgres-backup-verify-.*"} > 0
          for: 15m
          labels: { severity: critical }
          annotations:
            summary: Postgres WAL archive verification job failed
            description: |
              The weekly barman-cloud-check-wal-archive job has reported
              a failure. The S3 backup chain may be broken — recent backups
              might not be restorable. Investigate before next backup window.
        - alert: PostgresBackupVerifyMissing
          expr: |
            (time() - max(kube_job_status_completion_time{namespace="database-system",job_name=~"postgres-backup-verify-.*"})) > 60 * 60 * 24 * 10
          for: 1h
          labels: { severity: warning }
          annotations:
            summary: Postgres backup verification has not run in 10 days
            description: |
              No successful run of postgres-backup-verify in the last 10 days
              (expected weekly). CronJob may be suspended or pod scheduling blocked.
