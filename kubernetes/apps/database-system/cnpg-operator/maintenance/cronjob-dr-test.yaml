---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name postgres-backup-verify
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        type: cronjob
        cronjob:
          schedule: "0 4 * * 0"
          activeDeadlineSeconds: 1800 # 30m
          backoffLimit: 0
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
        containers:
          app:
            image:
              repository: ghcr.io/cloudnative-pg/plugin-barman-cloud
              tag: v0.12.0
            command:
              - barman-cloud-check-wal-archive
            args:
              - --endpoint-url=http://nas.homelab.internal:9000
              - s3://postgres/
              - postgres-v1
            env:
              AWS_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: cloudnative-pg
                    key: aws-access-key-id
              AWS_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: cloudnative-pg
                    key: aws-secret-access-key
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
