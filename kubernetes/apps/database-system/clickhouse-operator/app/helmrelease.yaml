---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name clickhouse-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: clickhouse-operator

  values:
    certManager:
      enabled: true
      install: false
    prometheus:
      service_monitor: true
