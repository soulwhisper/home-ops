---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/clickhouse.com/clickhousecluster_v1alpha1.json
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: default
spec:
  replicas: 2
  shards: 1
  keeperClusterRef:
    name: default
  dataVolumeClaimSpec:
    storageClassName: ceph-block
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 100Gi
  podTemplate:
    topologyZoneKey: topology.kubernetes.io/zone
    nodeHostnameKey: kubernetes.io/hostname
    volumes:
      - name: init-db
        configMap:
          name: clickhouse-init-db
      - name: init-user
        configMap:
          name: clickhouse-init-user
  containerTemplate:
    resources:
      requests:
        cpu: "2000m"
        memory: "4Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    volumeMounts:
      - mountPath: /docker-entrypoint-initdb.d/
        name: init-db
        readOnly: true
      - mountPath: /etc/clickhouse-server/users.d/
        name: init-user
        readOnly: true
  settings:
    enableDatabaseSync: true
    defaultUserPassword:
      passwordType: plaintext_password
      configMap:
        key: clickhouse-credentials
        name: default_password
