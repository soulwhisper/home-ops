---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name opentelemetry-collector
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: opentelemetry-collector

  values:
    fullnameOverride: *name
    mode: deployment
    replicaCount: 1
    image:
      repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    command:
      name: "otelcol-contrib"
    resources:
      requests: { cpu: 10m, memory: 512Mi }
      limits: { memory: 1Gi }
    serviceMonitor:
      enabled: true
    service:
      enabled: true
      type: ClusterIP
      trafficDistribution: PreferSameZone
    presets:
      kubernetesAttributes:
        enabled: true
    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        hostPort: null
        protocol: TCP
        appProtocol: grpc
      otlp-http:
        enabled: true
        containerPort: 4318
        servicePort: 4318
        hostPort: null
        protocol: TCP
      jaeger-compact: { enabled: false }
      jaeger-thrift: { enabled: false }
      jaeger-grpc: { enabled: false }
      zipkin: { enabled: false }
      metrics:
        enabled: true
        containerPort: 8888
        servicePort: 8888
        protocol: TCP
    alternateConfig:
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      processors:
        memory_limiter:
          check_interval: 1s
          limit_percentage: 80
          spike_limit_percentage: 25
        tail_sampling:
          decision_wait: 10s
          policies:
            - name: errors-policy
              type: status_code
              status_code: { status_codes: [ERROR] }
            - name: latency-policy
              type: latency
              latency: { threshold_ms: 5000 }
            - name: probability-policy
              type: probabilistic
              probabilistic: { sampling_percentage: 10 }
        batch:
          send_batch_size: 1024
          send_batch_max_size: 2048
          timeout: 1s
      exporters:
        otlphttp:
          endpoint: "http://victoria-traces.monitoring-system.svc.cluster.local:10428/insert/opentelemetry/v1/traces"
          tls:
            insecure: true
          sending_queue:
            enabled: true
            num_consumers: 10
            queue_size: 5000
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
      service:
        extensions: [health_check]
        telemetry:
          metrics:
            readers:
              - pull:
                  exporter:
                    prometheus:
                      host: 0.0.0.0
                      port: 8888
          logs:
            level: warn
            encoding: json
        pipelines:
          traces:
            receivers: [otlp]
            processors:
              - memory_limiter
              - k8sattributes
              - probabilistic_sampler
              - batch
            exporters: [otlphttp]
