---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: heartbeats
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        GATUS_URL: "http://10.10.0.100:9400"
        GATUS_TOKEN: "{{ .gatus }}"
  dataFrom:
    - extract:
        key: encryption_cipher
