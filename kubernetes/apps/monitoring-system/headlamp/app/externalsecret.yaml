---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        issuerURL: "https://auth.noirprime.com/application/o/headlamp/"
        scopes: "openid profile email"
        clientID: "{{ .headlamp_oidc_client_id }}"
        clientSecret: "{{ .headlamp_oidc_client_secret }}"
  dataFrom:
    - extract:
        key: authentik
