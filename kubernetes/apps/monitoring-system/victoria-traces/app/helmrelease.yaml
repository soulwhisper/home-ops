---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name victoria-traces
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-traces-single

  values:
    global:
      image:
        registry: quay.io
    server:
      fullnameOverride: *name
      retentionPeriod: 14d
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      serviceMonitor:
        enabled: true
