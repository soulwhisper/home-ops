---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name victoria-metrics-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-operator

  values:
    fullnameOverride: *name
    global:
      image:
        registry: quay.io
    crds:
      enabled: false
      plain: false
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: true
    env:
      - name: "VM_VMALERTMANAGER_ALERTMANAGERDEFAULTBASEIMAGE"
        value: "quay.io/prometheus/alertmanager"
    image:
      registry: "quay.io"
    operator:
      enable_converter_ownership: true # Required to allow VM to remove VM rules it imports if a prometheus rule is deleted
    serviceMonitor:
      enabled: true # use prometheus-operator ServiceMonitor CRD
