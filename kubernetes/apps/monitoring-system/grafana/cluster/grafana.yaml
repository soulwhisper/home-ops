---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: &name grafana
  labels:
    grafana.internal/instance: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    auth:
      disable_login_form: "true"
      oauth_auto_login: "true"
      signout_redirect_url: "https://auth.noirprime.com/application/o/grafana/end-session/"
    auth.generic_oauth:
      enabled: "true"
      name: "Authentik"
      client_id: "${GF_OAUTH_CLIENT_ID}"
      client_secret: "${GF_OAUTH_CLIENT_SECRET}"
      scopes: "openid profile email"
      auth_url: "https://auth.noirprime.com/application/o/authorize/"
      token_url: "https://auth.noirprime.com/application/o/token/"
      api_url: "https://auth.noirprime.com/application/o/userinfo/"
      allow_sign_up: "false"
      merge_existing_account: "true"
      role_attribute_path: >
        contains(groups[*], 'homelab-admin') && 'GrafanaAdmin' ||
        'Viewer'
    auth.anonymous:
      enabled: "false"
    users:
      allow_sign_up: "false"
      auto_assign_org: "true"
    date_formats:
      use_browser_locale: "true"
    log:
      mode: "console"
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    panels:
      disable_sanitize_html: "false"
    plugins:
      plugin_admin_enabled: "false"
    server:
      enable_gzip: "true"
      root_url: https://grafana.noirprime.com
    database:
      type: "postgres"
      host: "postgres-rw.database-system.svc.cluster.local:5432"
      name: *name
      user: *name
      password: *name
  deployment:
    spec:
      replicas: 2
      template:
        spec:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
          initContainers:
            - name: init-db
              image: ghcr.io/home-operations/postgres-init:18
              envFrom:
                - secretRef:
                    name: grafana-initdb
          containers:
            - name: grafana
              env:
                - name: GF_PLUGINS_PREINSTALL
                  value: "grafana-clock-panel,victoriametrics-metrics-datasource,victoriametrics-logs-datasource"
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: *name
                      key: admin-user
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: *name
                      key: admin-password
                - name: GF_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: *name
                      key: oidc_client_id
                - name: GF_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: *name
                      key: oidc_client_secret
              resources:
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  memory: 512Mi
  disableDefaultAdminSecret: true
  version: grafana/grafana:12.3.1
