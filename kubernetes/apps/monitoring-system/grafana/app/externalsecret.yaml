---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        admin-user: "{{ .admin_user }}"
        admin-password: "{{ .admin_pass }}"
        oidc_client_id: "{{ .grafana_oidc_client_id }}"
        oidc_client_secret: "{{ .grafana_oidc_client_secret }}"
  dataFrom:
    - extract:
        key: app_user
    - extract:
        key: authentik
