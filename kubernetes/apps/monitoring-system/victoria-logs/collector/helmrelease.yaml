---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name victoria-logs-collector
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector

  values:
    fullnameOverride: *name
    global:
      image:
        registry: quay.io
    podMonitor:
      enabled: true
    remoteWrite:
      - url: "http://victoria-logs-server.monitoring-system.svc.cluster.local:9428"
