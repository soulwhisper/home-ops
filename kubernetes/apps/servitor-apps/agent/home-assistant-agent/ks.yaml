---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name home-assistant-agent-secrets
  annotations:
    config.home-ops.io/managed: "true"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/home-assistant-agent/secrets"
  wait: false
  dependsOn:
    - name: onepassword-connect
      namespace: security-system
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name home-assistant-agent-mcp
  annotations:
    config.home-ops.io/managed: "true"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/home-assistant-agent/mcp"
  wait: false
  dependsOn:
    - name: home-assistant-agent-secrets
      namespace: servitor-apps
    - name: kagent
      namespace: servitor-apps
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name home-assistant-agent
  annotations:
    config.home-ops.io/managed: "true"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/home-assistant-agent/app"
  wait: false
  dependsOn:
    - name: home-assistant-agent-mcp
      namespace: servitor-apps
    - name: agentgateway
      namespace: networking-system
    - name: home-assistant
      namespace: smarthome-apps
