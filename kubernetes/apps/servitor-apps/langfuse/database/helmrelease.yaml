---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name langfuse-database
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: langfuse-database-initdb
        containers:
          app:
            image:
              repository: clickhouse/clickhouse-server
              tag: 26.1.11.9-alpine
            env:
              CLICKHOUSE_DB: "default"
              CLICKHOUSE_USER:
                valueFrom:
                  configMapKeyRef:
                    name: *name
                    key: CLICKHOUSE_USER
              CLICKHOUSE_PASSWORD:
                valueFrom:
                  configMapKeyRef:
                    name: *name
                    key: CLICKHOUSE_PASSWORD
            resources:
              requests:
                cpu: 2000m
                memory: 8Gi
              limits:
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            primary: true
            port: 8123
          clickhouse:
            port: 9000

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /var/lib/clickhouse
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/log/clickhouse-server
            subPath: logs
          - path: /tmp
            subPath: tmp
