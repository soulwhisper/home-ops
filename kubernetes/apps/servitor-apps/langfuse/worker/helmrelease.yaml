---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name langfuse-worker
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/langfuse/langfuse-worker
              tag: 3.167.4
            env:
              REDIS: langfuse-database-dragonfly.servitor-apps.svc.cluster.local
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: langfuse-database-pguser
                    key: uri
            envFrom:
              - configMapRef:
                  name: langfuse-database
              - secretRef:
                  name: langfuse-database
            resources:
              requests:
                cpu: 2000m
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: 3030

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
