---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name langfuse-worker
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: langfuse-initdb
        containers:
          app:
            image:
              repository: ghcr.io/langfuse/langfuse-worker
              tag: 3.171.0
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: langfuse-pguser
                    key: uri
              LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: &bucket_endpoint
                valueFrom:
                  configMapKeyRef:
                    name: ceph-bucket-langfuse
                    key: BUCKET_HOST
              LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: &bucket_access_key_id
                valueFrom:
                  secretKeyRef:
                    name: ceph-bucket-langfuse
                    key: AWS_ACCESS_KEY_ID
              LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY:
                &bucket_secret_access_key
                valueFrom:
                  secretKeyRef:
                    name: ceph-bucket-langfuse
                    key: AWS_SECRET_ACCESS_KEY
              LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: *bucket_endpoint
              LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: *bucket_access_key_id
              LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: *bucket_secret_access_key
              LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: *bucket_endpoint
              LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: *bucket_access_key_id
              LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: *bucket_secret_access_key
            envFrom:
              - configMapRef:
                  name: langfuse
              - secretRef:
                  name: langfuse
            resources:
              requests:
                cpu: 2000m
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: 3030

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
