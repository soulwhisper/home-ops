---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name mcp-context
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
        containers:
          app:
            image:
              repository: library/node
              tag: lts-alpine
            command:
              - "npx"
              - "-y"
              - "@upstash/context7-mcp"
              - "--transport=http"
              - "--port=3000"
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            appProtocol: agentgateway.dev/mcp
            port: 3000

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
