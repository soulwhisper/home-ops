---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-fluxcd-view
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-fluxcd-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: mcp-fluxcd-view
    namespace: servitor-apps
# Notes
# add additional cluster roles if needed
# Run: kubectl auth can-i list kustomizations.kustomize.toolkit.fluxcd.io --as=system:serviceaccount:servitor-apps:mcp-flux-view
