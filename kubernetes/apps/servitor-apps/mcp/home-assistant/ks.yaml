---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name mcp-home-assistant
  annotations:
    config.home-ops.io/managed: "true"
  labels:
    config.home-ops.io/deps: "infra"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
      kagent.dev/discovery: disabled
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/mcp/home-assistant/app"
  dependsOn:
    - name: home-assistant
      namespace: smarthome-apps
