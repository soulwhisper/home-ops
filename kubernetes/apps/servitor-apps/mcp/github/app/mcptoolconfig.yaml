---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/toolhive.stacklok.dev/mcptoolconfig_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPToolConfig
metadata:
  name: mcp-github
spec:
  toolsFilter:
    - search_repositories
    - get_file_contents
    - list_issues
    - get_issue
    - list_pull_requests
    - get_pull_request
    - create_pull_request
  toolsOverride:
    create_pull_request:
      description: "Create a pull request. Merging requires human review."
    get_file_contents:
      description: "Read file contents from an allowed repository."
