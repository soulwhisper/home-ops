---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/gateway.kgateway.dev/trafficpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: mcp-federation-traceparent
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: mcp-federation
  transformation:
    request:
      body:
        parseAs: None
      add:
        - name: x-trace-context
          value: "%REQ(traceparent)%"
    response:
      body:
        parseAs: None
