---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: &name mcp-victoria-logs
spec:
  groupRef:
    name: internal-ro
  image: ghcr.io/victoriametrics-community/mcp-victorialogs:7.1.0
  env:
    VL_INSTANCE_ENTRYPOINT: "http://victoria-logs-server.monitoring-system.svc.cluster.local:9428"
    MCP_SERVER_MODE: "http"
    MCP_LISTEN_ADDR: ":8081"
  mcpPort: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
