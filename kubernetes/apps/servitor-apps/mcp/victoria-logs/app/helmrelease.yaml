---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name mcp-victoria-logs
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
        containers:
          app:
            image:
              repository: ghcr.io/victoriametrics-community/mcp-victorialogs
              tag: 7.1.0
            env:
              VL_INSTANCE_ENTRYPOINT: "http://victoria-logs-server.monitoring-system.svc.cluster.local:9428"
              MCP_SERVER_MODE: "http"
              MCP_LISTEN_ADDR: ":8081"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            appProtocol: agentgateway.dev/mcp
            port: 8081

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
