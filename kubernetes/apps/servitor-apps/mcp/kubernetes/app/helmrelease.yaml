---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name mcp-kubernetes
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
        containers:
          app:
            image:
              repository: ghcr.io/containers/kubernetes-mcp-server
              tag: v0.0.61
            command:
              - "--config"
              - "/root/config.toml"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            appProtocol: agentgateway.dev/mcp
            port: 8080

    serviceAccount:
      *name : {}
    rbac:
      bindings:
        *name :
          type: ClusterRoleBinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: view
          subjects:
            - identifier: *name

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
      config:
        type: configMap
        name: *name
        globalMounts:
          - path: /root/config.toml
            subPath: config.toml
            readOnly: true
