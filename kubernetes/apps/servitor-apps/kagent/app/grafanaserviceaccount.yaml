---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/grafana.integreatly.org/grafanaserviceaccount_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaServiceAccount
metadata:
  name: &name grafana-mcp-sa
spec:
  name: *name
  instanceName: "grafana"
  role: "Viewer"
  isDisabled: false
  tokens:
    - name: *name
      secretName: token
