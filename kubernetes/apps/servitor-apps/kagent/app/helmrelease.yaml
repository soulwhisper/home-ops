---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name kagent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: kagent

  values:
    database:
      postgres:
        url: "postgresql://kagent:kagent@postgres-rw.database-system.svc.cluster.local:5432/kagent"
        vectorEnabled: true
        bundled:
          enabled: false
    kagent-tools:
      enabled: true
      tools:
        metrics:
          servicemonitor:
            enabled: true
    # agents
    agents:
      argo-rollouts-agent:
        enabled: false
      istio-agent:
        enabled: false
    # kmcp
    kmcp:
      enabled: true
    tools:
      grafana-mcp:
        enabled: false

  # add postgres init
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kagent-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kagent-controller
              spec:
                template:
                  spec:
                    initContainers:
                      - name: init-db
                        image: ghcr.io/home-operations/postgres-init:18
                        envFrom:
                          - secretRef:
                              name: kagent-initdb
