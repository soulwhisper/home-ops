---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name llama-qwen3
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      labels:
        config.home-ops.io/workload: inference
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  config.home-ops.io/workload: inference
              topologyKey: kubernetes.io/hostname
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server
            env:
              LLAMA_ARG_HOST: "0.0.0.0"
              LLAMA_ARG_PORT: &port 8080
              LLAMA_ARG_UI: "false"
              LLAMA_CACHE: /models
              LLAMA_ARG_HF_REPO: "bartowski/Qwen_Qwen3.5-4B-GGUF"
              LLAMA_ARG_HF_FILE: "Qwen_Qwen3.5-4B-Q6_K_L.gguf"
              # optimization
              LLAMA_ARG_CTX_SIZE: "8192"
              LLAMA_ARG_FLASH_ATTN: "on"
              LLAMA_ARG_THREADS: "8"
              LLAMA_ARG_N_PARALLEL: "2"
              # Keep thread pools inside the cgroup CPU quota (== limits.cpu).
              OMP_NUM_THREADS: "8"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /health, port: *port }
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /health, port: *port }
                  periodSeconds: 15
                  failureThreshold: 3
              # First boot downloads ~2.5GB through the proxy then loads the model;
              # give it a wide window so liveness can't kill the cold start.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /health, port: *port }
                  periodSeconds: 10
                  failureThreshold: 60
            resources:
              requests:
                cpu: "2"
                memory: 3Gi
              limits:
                cpu: "8"
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      shared:
        existingClaim: llama
        globalMounts:
          - path: /models
