---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.4.30
            args: ["gateway", "run"]
            env:
              HERMES_UID: "2000"
            envFrom: &envFrom
              - secretRef:
                  name: *name
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8642
                  failureThreshold: 30
                  periodSeconds: 10
              liveness: &liveness
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 30
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness: *liveness
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 4Gi
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
          web:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.4.30
            args: ["dashboard"]
            env:
              GATEWAY_HEALTH_URL: "http://localhost:8642"
              HERMES_UID: "2000"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext: *securityContext

    service:
      app:
        ports:
          http:
            port: *port
      web:
        primary: true
        ports:
          http:
            port: 9119
    route:
      app:
        hostnames: ["hermes.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: si-hermes
          gethomepage.dev/name: HermesAgent
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system
        rules:
          - backendRefs:
              - identifier: web
                port: http

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /opt/data
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
