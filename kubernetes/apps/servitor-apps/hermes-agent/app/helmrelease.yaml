---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000 # hermes user
            runAsGroup: 10000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.4.23
            args:
              - gateway
              - run
            env:
              HERMES_TUI: "1"
            envFrom: &envFrom
              - secretRef:
                  name: *name
            resources:
              requests: &requests
                cpu: 10m
              limits:
                memory: 4Gi
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
          web:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.4.23
            args:
              - dashboard
            env:
              GATEWAY_HEALTH_URL: "http://localhost:8642"
            envFrom: *envFrom
            resources:
              requests: *requests
              limits:
                memory: 512Mi
            securityContext: *securityContext

    service:
      app:
        ports:
          http:
            port: 8642
      web:
        primary: true
        ports:
          http:
            port: 9119
    route:
      app:
        hostnames: ["hermes.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: si-hermes
          gethomepage.dev/name: HermesAgent
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /opt/data
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
