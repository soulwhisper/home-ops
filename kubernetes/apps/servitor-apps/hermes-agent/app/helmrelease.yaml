---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000 # hermes
            runAsGroup: 10000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/soulwhisper/hermes-suite
              tag: 2026.5.7
            env:
              HERMES_SERVICES: "dashboard,gateway,webui"
            envFrom:
              - secretRef:
                  name: *name
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8642
                  failureThreshold: 30
                  periodSeconds: 10
              liveness: &liveness
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 30
                  failureThreshold: 5
                  timeoutSeconds: 10
              readiness: *liveness
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          api:
            primary: true
            port: *port
          http:
            port: 9119
          web:
            port: 8787

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /opt/data
            subPath: hermes
          - path: /workspace
            subPath: workspace
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
