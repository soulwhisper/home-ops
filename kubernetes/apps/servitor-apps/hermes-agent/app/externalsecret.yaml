---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        # Gateway
        WEIXIN_ACCOUNT_ID: "{{ .weixin_bot }}"
        WEIXIN_TOKEN: "{{ .weixin_bot }}:{{ .wechat_token }}"
        WEIXIN_BASE_URL: "ttps://ilinkai.weixin.qq.com"
        WEIXIN_CDN_BASE_URL: "https://novac2c.cdn.weixin.qq.com/c2c"
        WEIXIN_DM_POLICY: "allowlist"
        WEIXIN_ALLOW_ALL_USERS: "false"
        WEIXIN_ALLOWED_USERS: "{{ .weixin_id }}"
        WEIXIN_GROUP_POLICY: "disabled"
        WEIXIN_GROUP_ALLOWED_USERS: ""
        WEIXIN_HOME_CHANNEL: "{{ .weixin_id }}"
        # API
        FIRECRAWL_API_URL: "http://firecrawl.servitor-apps.svc.cluster.local:3002"
  dataFrom:
    - extract:
        key: hermes-agent
