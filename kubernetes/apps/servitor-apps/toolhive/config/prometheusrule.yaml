---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-behavior-rules
spec:
  groups:
    - name: ai-behavior.rules
      rules:
        - alert: AgentNewToolObserved
          annotations:
            summary: >-
              Agent invoked tool {{ $labels.gen_ai_tool_name }} not seen in the last 7 days.
          expr: |
            sum by (gen_ai_tool_name) (increase(agent_calls_total[1h])) > 0
            unless
            sum by (gen_ai_tool_name) (increase(agent_calls_total[7d] offset 1h)) > 0
          labels:
            severity: warning
        - alert: AgentToolCallSpike
          annotations:
            summary: >-
              Tool {{ $labels.gen_ai_tool_name }} call rate is 4x above its 7d baseline (sponge/loop suspect).
          expr: |
            sum by (gen_ai_tool_name) (rate(agent_calls_total[15m]))
            > 4 * sum by (gen_ai_tool_name) (avg_over_time(rate(agent_calls_total[15m])[7d:1h])) > 0
          for: 15m
          labels:
            severity: warning
        - alert: AgentRWToolOffHours
          annotations:
            summary: "internal-rw tool invoked between 02:00-07:00 CST."
          expr: |
            sum(increase(agent_calls_total{gen_ai_tool_name=~"(github|hass)_.*"}[10m])) > 0
            and on() (hour() >= 18 and hour() <= 23)
          labels:
            severity: critical
        - alert: AgentEgressDenied
          annotations:
            summary: >-
              CNP denied egress from {{ $labels.source_pod }} (intent/behaviour divergence).
          expr: |
            sum by (source_pod) (increase(hubble_drop_total{reason="POLICY_DENIED", source_namespace="servitor-apps"}[5m])) > 0
          labels:
            severity: critical
