---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name librechat-api
  annotations:
    config.home-ops.io/managed: "true"
  labels:
    config.home-ops.io/deps: "infra"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/librechat/api"
  dependsOn:
    - name: cnpg-cluster
      namespace: database-system
  components:
    - ../../../../components/cnpg
  postBuild:
    substitute:
      APP: librechat
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name librechat-mongodb
  annotations:
    config.home-ops.io/managed: "true"
  labels:
    config.home-ops.io/deps: "infra"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/librechat/mongodb"
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *name
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name librechat-app
  annotations:
    config.home-ops.io/managed: "true"
  labels:
    config.home-ops.io/deps: "infra"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: servitor-apps
  path: "./kubernetes/apps/servitor-apps/librechat/app"
  dependsOn:
    - name: librechat-api
      namespace: servitor-apps
    - name: librechat-mongodb
      namespace: servitor-apps
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *name
