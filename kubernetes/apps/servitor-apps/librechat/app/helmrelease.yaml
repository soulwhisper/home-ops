---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name librechat-app
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          config-init:
            image:
              repository: busybox
              tag: "latest"
            command:
              - sh
              - -c
              - |
                CONFIG="https://raw.githubusercontent.com/danny-avila/LibreChat/refs/heads/main/librechat.example.yaml"
                if [ ! -f /data/librechat.yaml ]; then
                  echo "Config file not found, downloading..."
                  wget -O /data/librechat.yaml ${CONFIG}
                  echo "Download complete."
                else
                  echo "Config file already exists, skipping download."
                fi
        containers:
          app:
            image:
              repository: ghcr.io/danny-avila/librechat-dev-api
              tag: latest
            env:
              NODE_ENV: "production"
              CONFIG_PATH: "/data/librechat.yaml"
              UID: "2000"
              GID: "2000"
            envFrom:
              - configMapRef:
                  name: librechat
              - secretRef:
                  name: librechat
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: 3080
    route:
      app:
        hostnames: ["chat.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: librechat.svg
          gethomepage.dev/name: LibreChat
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /data
            subPath: configs
          - path: /app/client/public/images
            subPath: images
          - path: /app/uploads
            subPath: uploads
          - path: /app/api/logs
            subPath: logs
