---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name dify-worker
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 2000 # volsync
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      *name :
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: langgenius/dify-api
              tag: 1.13.3
            env:
              MODE: "worker"
            envFrom:
              - configMapRef:
                  name: dify-api
              - secretRef:
                  name: dify-api
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 2Gi
            # by default, /app/api/celerybeat-schedule must be writable
            # env:CELERYBEAT_SCHEDULE_FILENAME not working

    persistence:
      app:
        existingClaim: dify-api
        globalMounts:
          - path: /app/api/storage
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
