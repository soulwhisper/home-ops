---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name dify-api
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: dify-api-initdb
        containers:
          app:
            image:
              repository: langgenius/dify-api
              tag: 1.13.3
            env:
              MODE: "api"
              PLUGIN_DAEMON_URL: "dify-database.servitor-apps.svc.cluster.local:5002"
              PLUGIN_REMOTE_INSTALL_HOST: "dify-database.servitor-apps.svc.cluster.local"
              PLUGIN_REMOTE_INSTALL_PORT: "5003"
            envFrom:
              - configMapRef:
                  name: *name
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: 5001

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /app/api/storage
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
            subPath: logs
          - path: /tmp
            subPath: tmp
