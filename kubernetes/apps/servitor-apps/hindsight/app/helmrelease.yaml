---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hindsight
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: hindsight-initdb
        containers:
          app:
            image:
              repository: ghcr.io/vectorize-io/hindsight
              tag: 0.8.0-slim
            env:
              HINDSIGHT_API_OTEL_TRACES_ENABLED: "true"
              HINDSIGHT_API_OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.monitoring-system.svc.cluster.local:4318"
              HINDSIGHT_API_VECTOR_EXTENSION: "vchord"
              HINDSIGHT_API_TEXT_SEARCH_EXTENSION: "pgroonga"
              HINDSIGHT_API_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: hindsight-pguser
                    key: uri
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            primary: true
            port: 9999
          api:
            port: 8888
    route:
      app:
        hostnames: ["memory.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: metabrainz.svg
          gethomepage.dev/name: Hindsight
          gethomepage.dev/group: Service
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
