---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name ollama
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        initContainers:
          pull-models:
            image:
              repository: ollama/ollama
              tag: 0.20.7
            command:
              - /bin/sh
              - -c
              - |
                MODELS="gemma4:26b gemma4:e4b qwen3-embedding:4b"
                echo "Starting temporary Ollama server..."
                ollama serve &
                SERVE_PID=$!
                until ollama list >/dev/null 2>&1; do sleep 2; done
                for model in $MODELS; do
                  if ollama list | grep -q "$model"; then
                    echo "Model $model already exists, skipping."
                  else
                    echo "Pulling model: $model..."
                    ollama pull "$model"
                  fi
                done
                kill $SERVE_PID
                wait $SERVE_PID
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.20.7
            env:
              OLLAMA_HOST: "0.0.0.0"
              OLLAMA_KEEP_ALIVE: "-1"
              OLLAMA_NUM_PARALLEL: "2"
              OLLAMA_MAX_LOADED_MODELS: "3"
              OLLAMA_FLASH_ATTENTION: "1"
              OLLAMA_KV_CACHE_TYPE: "q8_0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: &port 11434
                  initialDelaySeconds: 10
                  periodSeconds: 20
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *port
                  failureThreshold: 60
                  periodSeconds: 5
            resources:
              requests:
                cpu: 8000m
                memory: 28Gi
              limits:
                cpu: 12000m
                memory: 32Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /root/.ollama
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
