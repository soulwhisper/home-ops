---
apiVersion: v1
kind: ConfigMap
metadata:
  name: firecrawl
data:
  # General
  HOST: "0.0.0.0"
  USE_DB_AUTHENTICATION: "false"
  SENTRY_ENVIRONMENT: "production"
  ENV: "production"
  LOGGING_LEVEL: "DEBUG"
  IS_KUBERNETES: "true"
  # Database
  REDIS_URL: "redis://firecrawl-database-dragonfly.servitor-apps.svc.cluster.local:6379"
  REDIS_RATE_LIMIT_URL: "redis://firecrawl-database-dragonfly.servitor-apps.svc.cluster.local:6379"
  NUQ_DATABASE_URL: "postgresql://postgres:postgres@firecrawl-database.servitor-apps.svc.cluster.local:5432/postgres"
  # Service
  PLAYWRIGHT_MICROSERVICE_URL: "http://firecrawl.servitor-apps.svc.cluster.local:3000"
  MAX_CONCURRENT_JOBS: "2"
  NUM_WORKERS_PER_QUEUE: "2"
  CRAWL_CONCURRENT_REQUESTS: "2"
  BROWSER_POOL_SIZE: "2"
  MAX_CPU: "0.75"
  MAX_RAM: "0.75"
  # SearXNG
  SEARXNG_ENDPOINT: "http://searxng.selfhosted-apps.svc.cluster.local:8080"
