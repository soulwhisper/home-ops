---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name firecrawl
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
      terminationGracePeriodSeconds: 180
    controllers:
      # --- HTTP API ----------------------------------------------------
      firecrawl-api:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/firecrawl/firecrawl
              tag: latest
            command: ["node"]
            args:
              - --max-old-space-size=512
              - dist/src/index.js
            env:
              FLY_PROCESS_GROUP: app
              PORT: "3002"
            envFrom: &envFrom
              - configMapRef:
                  name: *name
            probes:
              liveness: &api_liveness
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v0/health/liveness
                    port: 3002
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *api_liveness
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 768Mi

      # --- Queue worker (BullMQ-style DeepSearch) ---------------------------------
      # firecrawl-worker:
      #   containers:
      #     app:
      #       image:
      #         repository: ghcr.io/firecrawl/firecrawl
      #         tag: latest
      #       command: ["node"]
      #       args:
      #         - --max-old-space-size=3072
      #         - dist/src/services/queue-worker.js
      #       env:
      #         FLY_PROCESS_GROUP: worker
      #         PORT: "3005"
      #       envFrom: *envFrom
      #       probes:
      #         liveness:
      #           enabled: true
      #           custom: true
      #           spec:
      #             httpGet:
      #               path: /liveness
      #               port: 3005
      #             initialDelaySeconds: 5
      #             periodSeconds: 5
      #             timeoutSeconds: 5
      #             failureThreshold: 3
      #         readiness:
      #           enabled: false
      #       resources:
      #         requests:
      #           cpu: 1000m
      #           memory: 3Gi
      #         limits:
      #           cpu: 1000m
      #           memory: 4Gi

      # --- NUQ worker (postgres-backed queue) --------------------------
      firecrawl-nuq-worker:
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/firecrawl/firecrawl
              tag: latest
            command: ["node"]
            args:
              - --max-old-space-size=1024
              - dist/src/services/worker/nuq-worker.js
            env:
              FLY_PROCESS_GROUP: nuq-worker
              NUQ_WORKER_PORT: "3006"
            envFrom: *envFrom
            probes:
              liveness: &nuq_worker_liveness
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3006
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *nuq_worker_liveness
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1536Mi

      # --- Playwright headless browser service -------------------------
      firecrawl-playwright:
        containers:
          app:
            image:
              repository: ghcr.io/firecrawl/playwright-service
              tag: latest
            env:
              PORT: "3000"
              ALLOW_LOCAL_WEBHOOKS: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: false
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1536Mi

    service:
      app:
        controller: firecrawl-api
        primary: true
        ports:
          http:
            port: 3002
      playwright:
        controller: firecrawl-playwright
        ports:
          http:
            port: 3000
