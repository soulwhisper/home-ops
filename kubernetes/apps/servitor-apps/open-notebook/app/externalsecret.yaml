---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-notebook
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        OPEN_NOTEBOOK_ENCRYPTION_KEY: "{{ .open_notebook }}"
  dataFrom:
    - extract:
        key: encryption_cipher
