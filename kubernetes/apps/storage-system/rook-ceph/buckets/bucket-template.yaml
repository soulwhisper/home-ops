---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/objectbucket.io/objectbucketclaim_v1alpha1.json
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: ceph-bucket-template
spec:
  bucketName: template
  storageClassName: ceph-bucket
  additionalConfig:
    bucketOwner: "template"
    bucketPolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "AWS": "arn:aws:iam:::user/template"
            },
            "Action": [
              "s3:*"
            ],
            "Resource": [
              "arn:aws:s3:::template/*",
              "arn:aws:s3:::template"
            ]
          }
        ]
      }
    # retentionPolicy 30d
    bucketLifecycle: |
      {
        "Rules": [
          {
            "ID": "AbortIncompleteMultipartUploads",
            "Status": "Enabled",
            "Prefix": "",
            "AbortIncompleteMultipartUpload": {
              "DaysAfterInitiation": 1
            }
          }
        ]
      }
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/ceph.rook.io/cephobjectstoreuser_v1.json
apiVersion: ceph.rook.io/v1
kind: CephObjectStoreUser
metadata:
  name: template
spec:
  store: ceph-objectstore
  clusterNamespace: storage-system
  keys:
    - accessKeyRef:
        name: rook-ceph-rgw-user
        key: TEMPLATE_ACCESS_KEY
      secretKeyRef:
        name: rook-ceph-rgw-user
        key: TEMPLATE_SECRET_KEY
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rook-ceph-rgw-user
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        TEMPLATE_ACCESS_KEY: "{{ .template_access_key }}"
        TEMPLATE_SECRET_KEY: "{{ .template_secret_key }}"
  dataFrom:
    - extract:
        key: minio
