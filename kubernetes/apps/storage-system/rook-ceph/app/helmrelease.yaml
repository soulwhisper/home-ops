---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name rook-ceph
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: rook-ceph

  values:
    crds:
      enabled: true
    csi:
      serviceMonitor:
        enabled: true
    monitoring:
      enabled: true
    # default obc fields = "maxObjects,maxSize"
    obcAllowAdditionalConfigFields: "bucketOwner,bucketPolicy,bucketLifecycle"
