---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-dashboard
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/icon: si-anthropic
    gethomepage.dev/name: AgentGateway
    gethomepage.dev/group: Observability
    gethomepage.dev/href: "https://ai.noirprime.com/ui/"
    gatus.home-operations.com/endpoint: |
      conditions:
        - "[STATUS] == 200"
spec:
  hostnames: ["ai.noirprime.com"]
  parentRefs:
    - name: kgateway-internal
      namespace: networking-system
  rules:
    - backendRefs:
        - name: agentgateway-proxy
          namespace: networking-system
          port: 15000
