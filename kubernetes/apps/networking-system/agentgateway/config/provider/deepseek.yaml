---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/agentgateway.dev/agentgatewaybackend_v1alpha1.json
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: &name deepseek-api
spec:
  ai:
    provider:
      openai:
        model: deepseek-v4-pro
        host: &host api.deepseek.com
        port: 443
        path: "/chat/completions"
  policies:
    ai:
      promptGuard:
        request:
          - response:
              message: "Request rejected: Contains destructive actions"
            regex:
              action: Reject
              matches:
                - "delete all"
                - "drop database"
          - response:
              message: "Request rejected: Contains sensitive information"
            regex:
              action: Reject
              builtins:
                - Email
                - CreditCard
    auth:
      secretRef:
        name: *name
    tls:
      sni: *host
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &name deepseek-api
spec:
  parentRefs:
    - name: agentgateway-proxy
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /deepseek
      backendRefs:
        - name: *name
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deepseek-api
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        Authorization: "{{ .deepseek }}"
  dataFrom:
    - extract:
        key: llm-api
