---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/agentgateway.dev/agentgatewaybackend_v1alpha1.json
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm-backend-anthropic
spec:
  ai:
    # if using deepseek, add 'prefix: /anthropic/v1'
    provider:
      anthropic:
        model: "zai-org/GLM-5.2"
      host: &host api.siliconflow.cn
      port: 443
  policies:
    auth:
      secretRef:
        name: siliconflow-credentials
    tls:
      sni: *host
