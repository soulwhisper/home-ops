---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/agentgateway.dev/agentgatewaypolicy_v1alpha1.json
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-guardrails
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: mcp-backend
  backend:
    mcp:
      guardrails:
        processors:
          - remote:
              backendRef:
                name: mcp-guardrails
                port: 9001
              failureMode: FailClosed
            methods:
              # Full = Request + Response. See header: this is the
              # single most important phase choice in the policy.
              tools/call: Full
              # Response-only: scan tool descriptions for poisoning.
              tools/list: Response
              # Response-only: scan prompt content for injection.
              prompts/get: Response
              # Response-only: scan resource bodies for exfil/injection.
              resources/read: Response
