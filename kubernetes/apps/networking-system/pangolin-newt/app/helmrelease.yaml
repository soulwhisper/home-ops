---
# yaml-language-server: $schema=https://kubernetes-schemas.noirprime.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name pangolin-newt
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    controllers:
      *name :
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          newt-sidecar:
            image:
              repository: ghcr.io/home-operations/newt-sidecar
              tag: 0.1.2
            args:
              - --gateway-name=kgateway-external
              - --site-id=home-ops-cluster
              - --target-hostname=kgateway-external.networking-system.svc.cluster.local
              - --deny-countries=RU,KP,IR,BY,IL,NL,DE,SC,VG
            restartPolicy: Always
            resources:
              limits:
                memory: 64Mi
        containers:
          app:
            image:
              repository: fosrl/newt
              tag: 1.10.3
            env:
              BLUEPRINT_FILE: /etc/newt/blueprint.yaml
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    rbac:
      roles:
        newt:
          type: ClusterRole
          rules:
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["httproutes"]
              verbs: ["get", "watch", "list"]
      bindings:
        newt:
          type: ClusterRoleBinding
          roleRef:
            identifier: newt
          subjects:
            - identifier: newt
    serviceAccount:
      newt: {}

    persistence:
      blueprint:
        type: emptyDir
        globalMounts:
          - path: /etc/newt
