---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name flux-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: flux-operator

  values:
    serviceMonitor:
      create: true
    web:
      networkPolicy:
        create: false
