---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name cronjob-k8s-schemas
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        type: cronjob
        cronjob:
          schedule: "10 1 * * *"
          backoffLimit: 4
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
        initContainers:
          generate-schemas:
            image:
              repository: ghcr.io/bjw-s-labs/k8s-crd-extractor
              tag: 2026.3.11@sha256:a26844ff81905a8fac4dba61b416bed087a1944e20e38634acba5a7f65eeac93
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        containers:
          app:
            image:
              repository: alpine/git
              tag: v2.52.0
            env:
              GIT_REPO: github.com/soulwhisper/CRD-catalog.git
            envFrom:
              - secretRef:
                  name: *name
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                apk add --no-cache curl openssl 2>/dev/null

                NOW=$(date +%s)
                HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' \
                  | openssl base64 -A | tr '+/' '-_' | tr -d '=')
                PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' \
                  $((NOW-60)) $((NOW+600)) "$APP_ID" \
                  | openssl base64 -A | tr '+/' '-_' | tr -d '=')
                UNSIGNED="${HEADER}.${PAYLOAD}"
                SIG=$(printf '%s' "$UNSIGNED" \
                  | openssl dgst -sha256 -sign /secrets/PRIVATE_KEY \
                  | openssl base64 -A | tr '+/' '-_' | tr -d '=')
                JWT="${UNSIGNED}.${SIG}"

                TOKEN=$(curl -sf -X POST \
                  -H "Authorization: Bearer ${JWT}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" \
                  | grep -o '"token":"[^"]*"' | cut -d'"' -f4)

                printf '%s' "$TOKEN" > /tmp/github-token
                printf '%s[bot]' "$APP_NAME" > /tmp/git-author-name
                printf '%s+%s[bot]@users.noreply.github.com' \
                  "$BOT_USER_ID" "$APP_NAME" > /tmp/git-author-email

                export HOME=/tmp
                GITHUB_TOKEN=$(cat /tmp/github-token)

                export GIT_AUTHOR_NAME=$(cat /tmp/git-author-name)
                export GIT_AUTHOR_EMAIL=$(cat /tmp/git-author-email)
                export GIT_COMMITTER_NAME="$GIT_AUTHOR_NAME"
                export GIT_COMMITTER_EMAIL="$GIT_AUTHOR_EMAIL"

                git clone --depth=1 \
                  "https://x-access-token:${GITHUB_TOKEN}@${GIT_REPO}" \
                  /tmp/repo

                mkdir -p /tmp/repo/schemas
                cp -r /data/crdSchemas/. /tmp/repo/schemas/
                cd /tmp/repo
                git add .
                if git diff --cached --quiet; then
                  echo "No changes to commit"
                  exit 0
                fi
                git commit -m "chore: update CRD schemas ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
                git push
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: false
              runAsUser: 0
              capabilities: { drop: ["ALL"] }

    serviceAccount:
      *name : {}
    rbac:
      roles:
        *name :
          type: ClusterRole
          rules:
            - apiGroups: ["apiextensions.k8s.io"]
              resources:
                [
                  "customresourcedefinitions",
                  "customresourcedefinitions/status",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiregistration.k8s.io"]
              resources: ["apiservices", "apiservices/status"]
              verbs: ["get", "list", "watch"]
      bindings:
        *name :
          type: ClusterRoleBinding
          roleRef:
            kind: ClusterRole
            identifier: *name
          subjects:
            - identifier: *name

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          *name :
            generate-schemas:
              - path: /config/.datree
                subPath: data
              - path: /tmp
                subPath: tmp
            app:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp
      secrets:
        type: secret
        name: *name
        advancedMounts:
          *name :
            app:
              - path: /secrets
                readOnly: true
