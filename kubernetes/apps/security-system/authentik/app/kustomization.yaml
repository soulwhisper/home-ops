---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # app
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  # utils
  - ./externalsecret.yaml
  - ./httproute.yaml
  - ./referencegrant.yaml
generatorOptions:
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: "disabled"
  disableNameSuffixHash: false
configMapGenerator:
  - name: authentik-blueprints-core
    files:
      - ./blueprints/core/flow-authentication.yaml
      - ./blueprints/core/outpost-proxy.yaml
      - ./blueprints/core/policy-reputation.yaml
      - ./blueprints/core/scope-groups-mapping.yaml
      - ./blueprints/core/scope-groups.yaml
  - name: authentik-blueprints-apps-forward
    files:
      - ./blueprints/forward/bambuddy.yaml
      - ./blueprints/forward/frigate-go2rtc.yaml
      - ./blueprints/forward/frigate.yaml
      - ./blueprints/forward/hass-code.yaml
      - ./blueprints/forward/lyrion.yaml
      - ./blueprints/forward/metube.yaml
      - ./blueprints/forward/sillytavern.yaml
      - ./blueprints/forward/victoria-metrics-alert.yaml
      - ./blueprints/forward/victoria-metrics-cluster.yaml
      - ./blueprints/forward/victoria-metrics-logs.yaml
      - ./blueprints/forward/z2m-code.yaml
      - ./blueprints/forward/z2m.taml
  - name: authentik-blueprints-apps-oidc
    files:
      - ./blueprints/oidc/calibre.yaml
      - ./blueprints/oidc/freshrss.yaml
      - ./blueprints/oidc/grafana.yaml
      - ./blueprints/oidc/headlamp.yaml
      - ./blueprints/oidc/home-assistant.yaml
      - ./blueprints/oidc/immich.yaml
      - ./blueprints/oidc/jellyfin.yaml
      - ./blueprints/oidc/karakeep.yaml
      - ./blueprints/oidc/kavita.yaml
      - ./blueprints/oidc/netbox.yaml
      - ./blueprints/oidc/stirling-pdf.yaml
