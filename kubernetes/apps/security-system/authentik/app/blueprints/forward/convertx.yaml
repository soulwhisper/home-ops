---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
entries:
  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: convertx-proxy-provider
    attrs:
      name: convertx-proxy-provider
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      mode: forward_domain
      external_host: "https://auth.noirprime.com"
      access_token_validity: "hours=12"
      cookie_domain: "noirprime.com"
  - model: authentik_core.application
    identifiers:
      slug: convertx
    attrs:
      name: convertx
      provider: !KeyOf convertx-proxy-provider
      meta_launch_url: "https://convert.noirprime.com"
      group: "Service"
      policy_engine_mode: any
  - model: authentik_policies_binding.policybinding
    identifiers:
      target: !KeyOf convertx
      group: !Find [authentik_core.group, [name, homelab-admin]]
      order: 0
    attrs: { enabled: true, timeout: 30 }
  - model: authentik_policies_binding.policybinding
    identifiers:
      target: !KeyOf convertx
      group: !Find [authentik_core.group, [name, homelab-internal]]
      order: 10
    attrs: { enabled: true, timeout: 30 }
