---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-apps-oidc
data:
  app-grafana-oidc.yaml: |
    version: 1
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: grafana-oidc-provider
        attrs:
          name: grafana-oidc-provider
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit]]
          client_type: confidential
          redirect_uris:
            - url: "https://grafana.noirprime.com/login/generic_oauth"
              matching_mode: strict
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      - model: authentik_core.application
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !KeyOf grafana-oidc-provider
          meta_launch_url: "https://grafana.noirprime.com"
          group: "Monitoring"
