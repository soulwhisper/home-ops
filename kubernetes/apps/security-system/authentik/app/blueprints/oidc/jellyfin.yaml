---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprints-oidc-jellyfin
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  dataFrom:
    - extract:
        key: authentik
  target:
    template:
      data:
        jellyfin.yaml: |
          # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
          version: 1
          context:
            client_id: "{{ .jellyfin_oidc_client_id }}"
            client_secret: "{{ .jellyfin_oidc_client_secret }}"
          entries:
            # jellyfin need plugin: '9p4/jellyfin-plugin-sso'
            - model: authentik_providers_oauth2.oauth2provider
              identifiers:
                name: &provider jellyfin-oidc-provider
              attrs:
                name: *provider
                client_id: !Context client_id
                client_secret: !Context client_secret
                authorization_flow:
                  !Find [
                    authentik_flows.flow,
                    [slug, default-provider-authorization-implicit-consent],
                  ]
                client_type: confidential
                redirect_uris:
                  - url: "https://movie.noirprime.com/sso/OID/redirect/authentik"
                    matching_mode: strict
                sub_mode: user_email
                include_claims_in_id_token: true
                signing_key:
                  !Find [
                    authentik_crypto.certificatekeypair,
                    [name, "authentik Self-signed Certificate"],
                  ]
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
            - model: authentik_core.application
              identifiers:
                slug: &name jellyfin
              attrs:
                name: *name
                provider: !KeyOf *provider
                meta_launch_url: "https://movie.noirprime.com"
                group: "Media"
                policy_engine_mode: any
            - model: authentik_policies_binding.policybinding
              identifiers:
                target: !KeyOf *name
                group: !Find [authentik_core.group, [name, homelab-admin]]
                order: 0
              attrs: { enabled: true, timeout: 30 }
            - model: authentik_policies_binding.policybinding
              identifiers:
                target: !KeyOf *name
                group: !Find [authentik_core.group, [name, homelab-internal]]
                order: 10
              attrs: { enabled: true, timeout: 30 }
