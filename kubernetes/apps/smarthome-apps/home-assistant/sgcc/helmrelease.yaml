---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name home-assistant-sgcc
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: arcw/sgcc_electricity
              tag: v1.7.3
            command:
              - python3
              - main.py
            env:
              ARK_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant
                    key: ark_api_key
              DB_TYPE: SQLITE
              HASS_URL: home-assistant:8123
              HASS_TOKEN:
                secretKeyRef:
                  name: home-assistant
                  key: supervisor_token
              PHONE_NUMBER:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant
                    key: sgcc_username
              PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant
                    key: sgcc_password
            resources:
              requests:
                cpu: 40m
              limits:
                memory: 1Gi

    persistence:
      app:
        existingClaim: home-assistant
        globalMounts:
          - path: /data
            subPath: sgcc
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
