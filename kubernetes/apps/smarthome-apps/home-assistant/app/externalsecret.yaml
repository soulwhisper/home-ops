---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        # code-server
        supervisor_token: "{{ .supervisor_token }}"
        # hass-sgcc
        sgcc_username: "{{ .sgcc_username }}"
        sgcc_password: "{{ .sgcc_password }}"
        # oidc
        oidc_client_id: "{{ .hass_oidc_client_id }}"
        oidc_client_secret: "{{ .hass_oidc_client_secret }}"
  dataFrom:
    - extract:
        key: home-assistant
    - extract:
        key: authentik
