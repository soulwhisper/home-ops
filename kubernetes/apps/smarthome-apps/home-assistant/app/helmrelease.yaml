---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name home-assistant
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        initContainers:
          hacs-installer:
            image:
              repository: busybox
              tag: "latest"
            command:
              - sh
              - -c
              - |
                HACS_VERSION=$(wget -qO- https://api.github.com/repos/hacs/integration/releases/latest \
                  | grep '"tag_name"' | cut -d'"' -f4)
                wget -O /tmp/hacs.zip \
                  "https://github.com/hacs/integration/releases/download/${HACS_VERSION}/hacs.zip"
                mkdir -p /config/custom_components/hacs
                unzip -o /tmp/hacs.zip -d /config/custom_components/hacs
                echo "HACS ${HACS_VERSION} installed."
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.4.3
            env:
              OIDC_CLIENT_ID:
                secretKeyRef:
                  name: *name
                  key: oidc_client_id
              OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: *name
                  key: oidc_client_secret
            resources:
              requests:
                cpu: 40m
              limits:
                memory: 2Gi
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.116.0
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /data/user-data
              - --extensions-dir
              - /data/extensions
              - --port
              - "1337"
              - /config
            env:
              HASS_SERVER: home-assistant:8123
              HASS_TOKEN:
                secretKeyRef:
                  name: *name
                  key: supervisor_token
            resources:
              requests:
                cpu: 40m
              limits:
                memory: 512Mi

    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
        primary: true
      code-server:
        ports:
          http:
            port: 1337

    route:
      app:
        hostnames: ["hass.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: home-assistant.svg
          gethomepage.dev/name: Home-Assistant
          gethomepage.dev/group: SmartHome
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system
        rules:
          - backendRefs:
              - identifier: app
                port: http
      code-server:
        hostnames: ["hass-code.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: code-server.svg
          gethomepage.dev/name: Home-Assistant-Code
          gethomepage.dev/group: SmartHome
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system
        rules:
          - backendRefs:
              - identifier: code-server
                port: http

    persistence:
      app:
        existingClaim: *name
        advancedMounts:
          *name :
            hacs-installer:
              - path: /config
                subPath: config
            app:
              - path: /config
                subPath: config
            code-server:
              - path: /config
                subPath: config
              - path: /data
                subPath: code-server
      packages:
        type: configMap
        name: *name
        advancedMounts:
          *name :
            app:
              - path: /config/packages
                readOnly: true
