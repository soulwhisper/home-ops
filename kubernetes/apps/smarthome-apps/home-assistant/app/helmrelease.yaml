---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name home-assistant
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        pod:
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          hacs-installer:
            image:
              repository: busybox
              tag: "latest"
            command:
              - sh
              - -c
              - |
                HACS_VERSION=$(wget -qO- https://api.github.com/repos/hacs/integration/releases/latest \
                  | grep '"tag_name"' | cut -d'"' -f4)
                wget -O /tmp/hacs.zip \
                  "https://github.com/hacs/integration/releases/download/${HACS_VERSION}/hacs.zip"
                mkdir -p /config/custom_components/hacs
                unzip -o /tmp/hacs.zip -d /config/custom_components/hacs
                echo "HACS ${HACS_VERSION} installed."
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.6.2
            env:
              OIDC_CLIENT_ID:
                secretKeyRef:
                  name: *name
                  key: oidc_client_id
              OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: *name
                  key: oidc_client_secret
            resources:
              requests:
                cpu: 40m
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123

    route:
      app:
        hostnames: ["hass.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: home-assistant.svg
          gethomepage.dev/name: Home-Assistant
          gethomepage.dev/group: SmartHome
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /config
            subPath: config
      packages:
        type: configMap
        name: *name
        globalMounts:
          - path: /config/packages
            readOnly: true
