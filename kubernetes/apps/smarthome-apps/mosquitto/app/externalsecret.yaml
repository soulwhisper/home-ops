---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mosquitto
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        # mosquitto_passwd -c <password file> <username>
        mosquitto: "{{ .mosquitto_password_hashed }}"
  dataFrom:
    - extract:
        key: zigbee2mqtt
