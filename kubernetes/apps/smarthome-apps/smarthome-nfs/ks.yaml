---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name smarthome-nfs
  annotations:
    config.home-ops.io/managed: "true"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: smarthome-apps
  path: "./kubernetes/apps/smarthome-apps/smarthome-nfs/app"
  wait: true
  dependsOn:
    - name: csi-driver-nfs
      namespace: storage-system
