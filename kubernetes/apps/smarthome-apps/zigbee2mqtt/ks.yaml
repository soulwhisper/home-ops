---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name zigbee2mqtt
  annotations:
    config.home-ops.io/managed: "true"
  labels:
    config.home-ops.io/deps: "infra"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  targetNamespace: smarthome-apps
  path: "./kubernetes/apps/smarthome-apps/zigbee2mqtt/app"
  dependsOn:
    - name: mosquitto
      namespace: smarthome-apps
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *name
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_STORAGECLASS: ceph-filesystem
      VOLSYNC_SNAPSHOTCLASS: ceph-filesystem-snapshot
