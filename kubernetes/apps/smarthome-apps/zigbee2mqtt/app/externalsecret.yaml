---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zigbee2mqtt
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        mosquitto_username: "{{ .mosquitto_username }}"
        mosquitto_password: "{{ .mosquitto_password }}"
        zigbee_pan_id: "{{ .zigbee_pan_id }}"
        zigbee_ext_pan_id: "{{ .zigbee_ext_pan_id }}"
        zigbee_network_key: "{{ .zigbee_network_key }}"
  dataFrom:
    - extract:
        key: zigbee2mqtt
