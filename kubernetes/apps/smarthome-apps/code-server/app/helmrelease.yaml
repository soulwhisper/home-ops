---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name code-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000 # coder
            runAsGroup: 1000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.122.1
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /data/user-data
              - --extensions-dir
              - /data/extensions
              - --port
              - "1337"
              - /workspace
            envFrom:
              - secretRef:
                  name: *name
            resources:
              requests:
                cpu: 40m
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: 1337

    route:
      app:
        hostnames: ["code.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: code-server.svg
          gethomepage.dev/name: CodeServer
          gethomepage.dev/group: SmartHome
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /data
      z2m-data:
        existingClaim: zigbee2mqtt
        globalMounts:
          - path: /workspace/z2m
      hass-data:
        existingClaim: home-assistant
        globalMounts:
          - path: /workspace/hass
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /nonexistent
            subPath: nonexistent
