---
# yaml-language-server: $schema=https://soulwhisper.github.io/k8s-schemas/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name navidrome
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: 0.62.0
            env:
              ND_ENABLEINSIGHTSCOLLECTOR: "false"
            resources:
              requests:
                cpu: 40m
              limits:
                memory: 1Gi

    service:
      app:
        ports:
          http:
            port: 4533
            protocol: TCP
    route:
      app:
        hostnames: ["music.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: navidrome.svg
          gethomepage.dev/name: Navidrome
          gethomepage.dev/group: Media
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /data
      shared:
        existingClaim: music
        globalMounts:
          - path: /music
