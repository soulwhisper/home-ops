---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name qbittorrent-ui
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.18.0
            env:
              QUI__HOST: 0.0.0.0
              QUI__PORT: &port 7476
              QUI__LOG_LEVEL: "INFO"
              QUI__OIDC_DISABLE_BUILT_IN_LOGIN: "true"
              QUI__OIDC_ENABLED: "true"
              QUI__OIDC_ISSUER: "https://auth.noirprime.com/application/o/qui/"
              QUI__OIDC_REDIRECT_URL: "https://qui.noirprime.com/api/auth/oidc/callback"
            envFrom:
              - secretRef:
                  name: *name
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - >
                        ls /downloads > /dev/null
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 15
                  failureThreshold: 5
                  successThreshold: 1
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["qui.noirprime.com"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: qbittorrent.svg
          gethomepage.dev/name: qBittorrent-ui
          gethomepage.dev/group: Download
        parentRefs:
          - name: kgateway-internal
            namespace: networking-system

    persistence:
      app:
        existingClaim: *name
        globalMounts:
          - path: /config
      shared:
        existingClaim: downloads
        globalMounts:
          - path: /downloads
