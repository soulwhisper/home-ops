---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# yamllint disable rule:truthy

name: Image-Pull
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.extract.outputs.images }}
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: home-operations/flate/action@4ef9bb741a9f346fbc719659ff0fd3080bac3eae # v0.3.4
        with:
          token: ""

      - name: Extract Images
        id: extract
        env:
          FLATE_OUTPUT: json
          FLATE_PATH: ./kubernetes/flux/cluster
        run: |
          images=$(flate diff images)
          echo "Images to pull:"
          echo "${images}" | yq --prettyPrint
          if [ "${images}" = "[]" ]; then
              images='["__skip__"]'
          fi
          echo 'images<<EOF' >> "${GITHUB_OUTPUT}"
          echo "${images}" >> "${GITHUB_OUTPUT}"
          echo 'EOF' >> "${GITHUB_OUTPUT}"

  pull:
    if: ${{ needs.extract.outputs.images != '[]' }}
    needs: extract
    name: Image Pull - Pull
    runs-on: home-ops-runner
    strategy:
      matrix:
        image: ${{ fromJSON(needs.extract.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Pull Image
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          if [ "${IMAGE}" = "__skip__" ]; then
            echo "No new images to pull"
            exit 0
          fi
          crane pull "${IMAGE}" /dev/null --platform linux/amd64

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Check job status
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
