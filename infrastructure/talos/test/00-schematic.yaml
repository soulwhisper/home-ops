---
# schematic for test environment
customization:
  bootloader: sd-boot
  extraKernelArgs:
    - cpufreq.default_governor=performance
    - -lockdown # secureboot
    - lockdown=integrity # secureboot
    - console=ttyS0 # hci only
  systemExtensions:
    officialExtensions:
      - siderolabs/i915
      - siderolabs/intel-ucode
      - siderolabs/mei
      - siderolabs/nut-client
