---
# schematic for production environment
# ca4e814e9b30bbcdf282715f2a93fd9b130ae8f75109ccaef45e06382a08caf5
customization:
  bootloader: sd-boot
  extraKernelArgs:
    # stability
    - pcie_aspm=off
    - nvme_core.default_ps_max_latency_us=0
    # hardware
    - i915.enable_guc=3
    - module_blacklist=igc
  systemExtensions:
    officialExtensions:
      - siderolabs/i915
      - siderolabs/intel-ucode
      - siderolabs/mei
      - siderolabs/nut-client
