---
# Zot Clustering
# with patch: infrastructure/talos/prod/30-private-mirrors.yaml
# set zot.homelab.internal A 10.10.0.81-83

name: zotregistry

x-zot-shared: &zot-shared
  image: "ghcr.io/project-zot/zot-linux-amd64:v2.1.16"
  restart: "unless-stopped"
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  configs:
    - source: "config.json"
      target: "/etc/zot/config.json"
  env_file:
    - zotregistry.sops.env
  depends_on:
    valkey:
      condition: service_healthy

services:
  zot-valkey:
    image: "valkey/valkey:8.1-alpine"
    container_name: "zot-valkey"
    restart: "unless-stopped"
    networks:
      zot-internal: {}
    command:
      - "valkey-server"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--protected-mode"
      - "no"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  zot-1:
    <<: *zot-shared
    container_name: "zot-1"
    networks:
      zot-internal: {}
      zot-lan:
        ipv4_address: "10.10.0.81"

  zot-2:
    <<: *zot-shared
    container_name: "zot-2"
    networks:
      zot-internal: {}
      zot-lan:
        ipv4_address: "10.10.0.82"

  zot-3:
    <<: *zot-shared
    container_name: "zot-3"
    networks:
      zot-internal: {}
      zot-lan:
        ipv4_address: "10.10.0.83"

networks:
  zot-internal:
    driver: bridge
  zot-lan:
    driver: macvlan
    driver_opts:
      parent: "${MACVLAN_PARENT:-bond0}"
    ipam:
      config:
        - subnet: 10.10.0.0/24
          gateway: 10.10.0.254
          ip_range: 10.10.0.80/30

configs:
  config.json:
    content: |
      {
        "distSpecVersion": "1.1.0",
        "storage": {
          "rootDirectory": "/tmp/zot",
          "commit": false,
          "dedupe": true,
          "gc": true,
          "gcDelay": "2h",
          "gcInterval": "24h",
          "remoteCache": true,
          "cacheDriver": {
            "name": "redis",
            "url": "redis://zot-valkey:6379"
          },
          "storageDriver": {
            "name": "s3",
            "rootdirectory": "/zot",
            "region": "us-east-1",
            "regionendpoint": "nas.homelab.internal:9000",
            "bucket": "zot",
            "secure": false,
            "skipverify": false
          },
          "retention": {
            "dryRun": false,
            "delay": "24h",
            "policies": [
              {
                "repositories": ["**"],
                "deleteReferrers": true,
                "deleteUntagged": true,
                "keepTags": [
                  {
                    "mostRecentlyPushedCount": 10,
                    "mostRecentlyPulledCount": 5
                  }
                ]
              }
            ]
          }
        },
        "cluster": {
          "members": [
            "zot-1:9002",
            "zot-2:9002",
            "zot-3:9002"
          ],
          "hashKey": "pL3sD6fG8hJ9kL0zXcVbN1mQ2wE4rT5yU7iI8oO9pPaAsSdDfFgGhHjJkK"
        },
        "http": {
          "address": "0.0.0.0",
          "port": "9002"
        },
        "log": {
          "level": "warn"
        },
        "extensions": {
          "ui": {
            "enable": true
          },
          "search": {
            "enable": true,
            "cve": {
              "updateInterval": "2h"
            }
          },
          "scrub": {
            "enable": true,
            "interval": "24h"
          },
          "sync": {
            "enable": true,
            "registries": [
              {
                "urls": ["https://mirror.gcr.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/docker.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://gcr.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/gcr.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://ghcr.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/ghcr.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://quay.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/quay.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://registry.k8s.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/registry.k8s.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://public.ecr.aws"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/public.ecr.aws",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              }
            ]
          }
        }
      }
