---
# Zot Clustering
# with patch: infrastructure/talos/prod/30-private-mirrors.yaml

name: zotregistry

x-zot-shared: &zot-shared
  image: "ghcr.io/project-zot/zot-linux-amd64:v2.1.18"
  restart: "unless-stopped"
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  configs:
    - source: "config.json"
      target: "/etc/zot/config.json"
  extra_hosts:
    - "nas.homelab.internal:host-gateway"
  depends_on:
    zot-valkey:
      condition: service_healthy

services:
  zot-valkey:
    image: "valkey/valkey:9.1-alpine"
    container_name: "zot-valkey"
    restart: "unless-stopped"
    command:
      - "valkey-server"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--protected-mode"
      - "no"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  zot-caddy:
    image: "caddy:2-alpine"
    container_name: "zot-caddy"
    restart: "unless-stopped"
    ports:
      - "9002:9002"
    configs:
      - source: "Caddyfile"
        target: "/etc/caddy/Caddyfile"
    depends_on:
      - zot-1
      - zot-2
      - zot-3

  zot-1:
    <<: *zot-shared
    container_name: "zot-1"
    env_file:
      - zotregistry.sops.env

  zot-2:
    <<: *zot-shared
    container_name: "zot-2"
    env_file:
      - zotregistry.sops.env

  zot-3:
    <<: *zot-shared
    container_name: "zot-3"
    env_file:
      - zotregistry.sops.env

configs:
  Caddyfile:
    content: |
      {
        auto_https off
        admin off
      }
      :9002 {
        reverse_proxy zot-1:9002 zot-2:9002 zot-3:9002 {
          lb_policy round_robin
          lb_try_duration 5s
          health_uri /readyz
          health_interval 10s
          health_timeout 3s
          fail_duration 30s
          max_fails 2
        }
        encode gzip
        log {
          output stdout
          format console
          level WARN
        }
      }

  config.json:
    content: |
      {
        "distSpecVersion": "1.1.1",
        "storage": {
          "rootDirectory": "/tmp/zot",
          "commit": false,
          "dedupe": true,
          "gc": true,
          "gcDelay": "2h",
          "gcInterval": "24h",
          "remoteCache": true,
          "cacheDriver": {
            "name": "redis",
            "url": "redis://zot-valkey:6379"
          },
          "storageDriver": {
            "name": "s3",
            "region": "us-east-1",
            "regionendpoint": "nas.homelab.internal:9000",
            "bucket": "zot",
            "forcepathstyle": true,
            "secure": false,
            "skipverify": false
          },
          "retention": {
            "dryRun": false,
            "delay": "24h",
            "policies": [
              {
                "repositories": ["**"],
                "deleteReferrers": true,
                "deleteUntagged": true,
                "keepTags": [
                  {
                    "mostRecentlyPushedCount": 10,
                    "mostRecentlyPulledCount": 5
                  }
                ]
              }
            ]
          }
        },
        "cluster": {
          "members": [
            "zot-1:9002",
            "zot-2:9002",
            "zot-3:9002"
          ],
          "hashKey": "Ahj9MFEqgzjWFBVJ"
        },
        "http": {
          "address": "0.0.0.0",
          "port": "9002"
        },
        "log": {
          "level": "warn"
        },
        "extensions": {
          "ui": {
            "enable": true
          },
          "search": {
            "enable": true
          },
          "scrub": {
            "enable": true,
            "interval": "24h"
          },
          "sync": {
            "enable": true,
            "downloadDir": "/tmp/zot",
            "registries": [
              {
                "urls": ["https://mirror.gcr.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/docker.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://gcr.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/gcr.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://ghcr.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/ghcr.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://quay.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/quay.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://registry.k8s.io"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/registry.k8s.io",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              },
              {
                "urls": ["https://public.ecr.aws"],
                "content": [
                  {
                    "prefix": "**",
                    "destination": "/public.ecr.aws",
                    "stripPrefix": true
                  }
                ],
                "onDemand": true,
                "tlsVerify": true
              }
            ]
          }
        }
      }
