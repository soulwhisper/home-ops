---
name: pangolin
services:
  pangolin:
    image: docker.io/fosrl/pangolin:ee-1.16.2
    container_name: pangolin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    volumes:
      - /opt/pangolin/config:/app/config
    configs:
      - source: pangolin_config
        target: /app/config/config.yml
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:3001/api/v1/"
      interval: "10s"
      timeout: "10s"
      retries: 15

  gerbil:
    image: docker.io/fosrl/gerbil:1.3.0
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - /opt/pangolin/config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80

  traefik:
    image: docker.io/traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - /opt/pangolin/config/letsencrypt:/letsencrypt
      - /opt/pangolin/config/traefik/logs:/var/log/traefik
      - ./configs/dynamic:/etc/traefik/dynamic:ro
      - ./configs/traefik.yml:/etc/traefik/traefik.yml:ro

networks:
  default:
    driver: bridge
    name: pangolin

configs:
  pangolin_config:
    content: |-
      # https://docs.pangolin.net/
      gerbil:
          start_port: 51820
          base_endpoint: "pangolin.noirprime.com"
      app:
          dashboard_url: "https://pangolin.noirprime.com"
          log_level: "info"
          telemetry:
              anonymous_usage: false
      domains:
          domain1:
              base_domain: "noirprime.com"
              cert_resolver: "letsencrypt"
      server:
          secret: "${PANGOLIN_SERVER_SECRET}"
          cors:
              origins: ["https://pangolin.noirprime.com"]
              methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
              allowed_headers: ["X-CSRF-Token", "Content-Type"]
              credentials: false
      flags:
          require_email_verification: false
          disable_signup_without_invite: true
          disable_user_create_org: false
          allow_raw_resources: true
          enable_integration_api: true
