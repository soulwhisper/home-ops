---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: kopia-daily-maintenance
spec:
  enabled: true
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /volume1/backup/volsync
          server: nas.homelab.internal
  repository:
    repository: volsync-secret
  trigger:
    schedule: "30 3,15 * * *"
