---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/storage.k8s.io/storageclass_v1.json
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: media-nfs
  # would replace 'media-apps' later
provisioner: nfs.csi.k8s.io
parameters:
  server: nas.homelab.internal
  share: /var/lib/shared
  subDir: "${pvc.metadata.name}"
  onDelete: retain
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
mountOptions:
  - nfsvers=4.1
  - hard
  - noatime
  - nconnect=16
