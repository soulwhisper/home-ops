---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name tei-reranker
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
      labels:
        config.home-ops.io/workload: inference
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  config.home-ops.io/workload: inference
              topologyKey: kubernetes.io/hostname
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
          config.home-ops.io/proxy: "https" # https_proxy needed
        containers:
          app:
            image:
              repository: ghcr.io/huggingface/text-embeddings-inference
              tag: cpu-1.9
            env:
              MODEL_ID: "BAAI/bge-reranker-v2-m3"
              PORT: &port 3000
              MKL_DEBUG_CPU_TYPE: "5"
              MKL_NUM_THREADS: "8"
              RAYON_NUM_THREADS: "8"
              TOKENIZERS_PARALLELISM: "false"
              HUGGINGFACE_HUB_CACHE: "/tmp/huggingface"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 60
                  periodSeconds: 5
              liveness: &liveness
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 30
                  failureThreshold: 3
              readiness: *liveness
            resources:
              requests:
                cpu: 2000m
                memory: 6Gi
              limits:
                cpu: 8000m
                memory: 6Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      app:
        existingClaim: tei
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
