---
# yaml-language-server: $schema=https://soulwhisper.github.io/CRD-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name librechat-api
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: gitops-system

  values:
    defaultPodOptions:
      hostUsers: false
    controllers:
      *name :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: librechat-initdb
        containers:
          app:
            image:
              repository: ghcr.io/danny-avila/librechat-rag-api-dev-lite
              tag: v0.8.0
            env:
              RAG_PORT: &port 8000
              PGVECTOR_CREATE_EXTENSION: "false"
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: &pguser librechat-pguser
                    key: host
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: db
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *pguser
                    key: password
            envFrom:
              - configMapRef:
                  name: librechat
              - secretRef:
                  name: librechat
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
